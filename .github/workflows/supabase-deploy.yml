name: Deploy Supabase

on:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
      WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
      APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
      KBS_CRON_SECRET: ${{ secrets.KBS_CRON_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          set -e
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing secret: SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing secret: SUPABASE_DB_PASSWORD" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing secret: SUPABASE_PROJECT_ID" && exit 1)

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        run: supabase db push

      - name: Set function runtime secrets
        if: ${{ env.WECHAT_APPID != '' && env.WECHAT_SECRET != '' && env.APP_JWT_SECRET != '' && env.KBS_CRON_SECRET != '' }}
        run: |
          supabase secrets set \
            WECHAT_APPID="$WECHAT_APPID" \
            WECHAT_SECRET="$WECHAT_SECRET" \
            APP_JWT_SECRET="$APP_JWT_SECRET" \
            KBS_CRON_SECRET="$KBS_CRON_SECRET" \
            --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Edge Functions
        run: |
          set -e
          for dir in supabase/functions/*; do
            if [ -d "$dir" ]; then
              fn="$(basename "$dir")"
              echo "Deploying function: $fn"
              # 使用 publishable key 调用函数时，不走 Supabase JWT 鉴权；
              # 业务鉴权由函数内部 x-kbs-token 执行。
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
            fi
          done

